<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu — Be Pub</title>
    <style>
        /* --- RESET & VARIABILI APPLE STYLE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #000000; /* Nero assoluto OLED */
            color: #ffffff;
            overflow-x: hidden;
        }

        /* --- NAVBAR BLURREDIZZATA --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .nav-logo {
            font-weight: 600;
            font-size: 19px;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: #f5f5f7;
        }

        .nav-links a {
            color: #86868b;
            text-decoration: none;
            font-size: 13px;
            margin-left: 24px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #ffffff;
        }

        /* --- CONTENITORE MENU --- */
        main {
            max-width: 750px;
            margin: 0 auto;
            padding: 120px 16px 80px 16px;
        }

        .menu-header {
            text-align: center;
            margin-bottom: 70px;
        }

        .menu-header h1 {
            font-size: 44px;
            font-weight: 700;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-header p {
            color: #86868b;
            font-size: 17px;
            font-weight: 400;
        }

        /* --- GALLERIA VERTICALE --- */
        .menu-gallery {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .menu-page-container {
            width: 100%;
            position: relative;
        }

        .menu-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            background-color: #1c1c1e;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @media (hover: hover) {
            .menu-image:hover {
                transform: scale(1.015);
            }
        }

        @media (max-width: 768px) {
            .menu-header h1 {
                font-size: 36px;
            }
            .menu-gallery {
                gap: 20px;
            }
            .menu-image {
                border-radius: 18px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="#" class="nav-logo">Be Pub</a>
            <div class="nav-links">
                <a href="#">Home</a>
                <a href="#" class="active">Menu</a>
                <a href="#">Contatti</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="menu-header">
            <h1>Il Menu.</h1>
            <p>Selezionato, artigianale, Be Pub.</p>
        </div>

        <div class="menu-gallery">
            
            <div class="menu-page-container"><img src="1.png" alt="Pagina 1" class="menu-image"></div>
            <div class="menu-page-container"><img src="2.png" alt="Pagina 2" class="menu-image"></div>
            <div class="menu-page-container"><img src="3.png" alt="Pagina 3" class="menu-image"></div>
            <div class="menu-page-container"><img src="4.png" alt="Pagina 4" class="menu-image"></div>
            <div class="menu-page-container"><img src="5.png" alt="Pagina 5" class="menu-image"></div>
            <div class="menu-page-container"><img src="6.png" alt="Pagina 6" class="menu-image"></div>
            <div class="menu-page-container"><img src="7.png" alt="Pagina 7" class="menu-image"></div>
            <div class="menu-page-container"><img src="8.png" alt="Pagina 8" class="menu-image"></div>
            <div class="menu-page-container"><img src="9.png" alt="Pagina 9" class="menu-image"></div>
            <div class="menu-page-container"><img src="10.png" alt="Pagina 10" class="menu-image"></div>
            <div class="menu-page-container"><img src="11.png" alt="Pagina 11" class="menu-image"></div>
            <div class="menu-page-container"><img src="12.png" alt="Pagina 12" class="menu-image"></div>
            <div class="menu-page-container"><img src="13.png" alt="Pagina 13" class="menu-image"></div>
            <div class="menu-page-container"><img src="14.png" alt="Pagina 14" class="menu-image"></div>
            <div class="menu-page-container"><img src="15.png" alt="Pagina 15" class="menu-image"></div>

        </div>
    </main>

</body>
</html>
